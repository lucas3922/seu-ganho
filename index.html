<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Driver Elite</title>

<style>

body{
font-family:Arial;
background:#121212;
color:white;
padding:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:none;
background:#2a2a2a;
color:white;
}

button{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:8px;
font-weight:bold;
}

#calcular{
background:#00ff88;
color:black;
}

#salvar{
background:#0088ff;
color:white;
}

#resultado{
background:#1e1e1e;
padding:15px;
border-radius:10px;
display:none;
}

</style>
</head>

<body>

<h2>Driver Elite</h2>

<label>Ganho Bruto</label>
<input id="bruto" type="number">

<label>KM Rodados</label>
<input id="km" type="number">

<label>Horas</label>
<input id="horas" type="number">

<label>Alimentação</label>
<input id="comida" type="number">

<label>Média KM/L</label>
<input id="media" type="number">

<label>Preço Gasolina</label>
<input id="gas" type="number">

<button id="calcular">CALCULAR</button>

<button id="salvar">SALVAR</button>

<div id="resultado"></div>

<script>

let ultimoCalculo=null

const calcularBtn=document.getElementById("calcular")
const salvarBtn=document.getElementById("salvar")

calcularBtn.addEventListener("click",function(){

const bruto=parseFloat(document.getElementById("bruto").value)||0
const km=parseFloat(document.getElementById("km").value)||0
const horas=parseFloat(document.getElementById("horas").value)||0
const comida=parseFloat(document.getElementById("comida").value)||0
const media=parseFloat(document.getElementById("media").value)||0
const gas=parseFloat(document.getElementById("gas").value)||0

if(bruto<=0||km<=0||media<=0){

alert("Preencha Bruto, KM e Média")

return

}

const custoGas=(km/media)*gas

const liquido=bruto-custoGas-comida

const brutoKm=bruto/km

const liquidoHora=horas>0?liquido/horas:0

const box=document.getElementById("resultado")

box.style.display="block"

box.innerHTML=

"Lucro: R$ "+liquido.toFixed(2)+"<br>"+
"Bruto/KM: R$ "+brutoKm.toFixed(2)+"<br>"+
"Líquido/Hora: R$ "+liquidoHora.toFixed(2)

ultimoCalculo={bruto,km,horas,liquido}

})

salvarBtn.addEventListener("click",function(){

if(!ultimoCalculo){

alert("Calcule antes")

return

}

let historico=JSON.parse(localStorage.getItem("driver_hist"))||[]

historico.push(ultimoCalculo)

localStorage.setItem("driver_hist",JSON.stringify(historico))

alert("Salvo!")

})

</script>

</body>
</html>
