<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Admin - Gestão 360</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #00ff88; --secondary: #0088ff; --danger: #ff4444; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; padding-bottom: 50px; }
        .container { max-width: 450px; margin: auto; }
        
        /* Dashboard de Meta */
        .fin-card { background: linear-gradient(145deg, #1e1e1e, #252525); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; text-align: center; }
        .fin-title { font-size: 0.75em; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .fin-val { font-size: 1.6em; font-weight: bold; display: block; margin: 5px 0; }
        
        /* Abas */
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #2a2a2a; color: #888; font-weight: bold; cursor: pointer; font-size: 0.85em; }
        .tab-btn.active { background: var(--secondary); color: white; }

        .input-group { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        label { display: block; margin: 8px 0 4px; color: var(--primary); font-weight: bold; font-size: 0.7em; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; font-size: 16px; box-sizing: border-box; }
        
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 8px; transition: 0.2s; }
        .btn-calc { background: var(--primary); color: #121212; }
        .btn-save { background: var(--secondary); color: white; }
        
        /* Resultados e Stats */
        .results { background: var(--card); padding: 15px; border-radius: 12px; border-left: 5px solid var(--primary); margin-top: 10px; display: none; }
        .res-item { display: flex; justify-content: space-between; margin: 5px 0; font-size: 0.9em; }
        
        .stat-section { margin-top: 25px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid var(--secondary); }
        .stat-card h4 { margin: 0 0 8px 0; font-size: 0.9em; color: var(--secondary); text-transform: uppercase; }
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .mini-stat { background: #252525; padding: 8px; border-radius: 6px; font-size: 0.75em; color: #aaa; }
        .mini-stat b { display: block; color: #fff; font-size: 1.1em; margin-top: 2px; }

        .bill-item { display: flex; justify-content: space-between; background: #2a2a2a; padding: 10px; border-radius: 8px; margin-bottom: 8px; }
        .hidden { display: none; }
    </style>
</head>
<body onload="inicializar()">

<div class="container">
    <div class="fin-card">
        <span class="fin-title">Dívida de Casa Restante</span>
        <span id="dividaRestante" class="fin-val" style="color: var(--danger);">R$ 0,00</span>
        <span id="metaDiaria" style="font-size: 0.8em; color: var(--primary);">Meta: R$ 0,00 / dia</span>
    </div>

    <div class="tabs">
        <button id="btn1" class="tab-btn active" onclick="mudarAba(1)">Corrida</button>
        <button id="btn2" class="tab-btn" onclick="mudarAba(2)">Resumos</button>
        <button id="btn3" class="tab-btn" onclick="mudarAba(3)">Contas</button>
    </div>

    <div id="aba1">
        <div class="input-group">
            <label>💰 Ganho Bruto (R$)</label>
            <input id="bruto" type="text" inputmode="decimal" placeholder="0,00">
            <label>📏 KM Rodados</label>
            <input id="km" type="text" inputmode="decimal" placeholder="0">
            <label>⏱️ Horas Online</label>
            <input id="horas" type="text" inputmode="decimal" placeholder="0">
            <div style="display: flex; gap: 8px;">
                <div style="flex:1"><label>🍔 Alimentação</label><input id="comida" type="text" inputmode="decimal" placeholder="0,00"></div>
                <div style="flex:1"><label>Km/L</label><input id="media" type="text" inputmode="decimal"></div>
                <div style="flex:1"><label>Gasolina R$</label><input id="gasolina" type="text" inputmode="decimal"></div>
            </div>
        </div>
        <button class="btn-main btn-calc" onclick="calcular()">CALCULAR AGORA</button>
        <button class="btn-main btn-save" onclick="salvar()">SALVAR E ABATER</button>

        <div id="painelResultados" class="results">
            <div class="res-item"><span>Lucro Líquido:</span> <b id="resLiq" style="color:var(--primary)"></b></div>
            <div class="res-item"><span>Líquido p/ Hora:</span> <span id="resLiqHr"></span></div>
            <div class="res-item"><span>Bruto p/ KM:</span> <span id="resBrutoKm"></span></div>
        </div>
    </div>

    <div id="aba2" class="hidden">
        <div class="stat-section" id="renderStats"></div>
    </div>

    <div id="aba3" class="hidden">
        <div class="input-group">
            <label>Nova Conta</label>
            <input id="nomeConta" type="text" placeholder="Ex: Aluguel">
            <label>Valor</label>
            <input id="valorConta" type="text" inputmode="decimal" placeholder="0,00">
            <button class="btn-main btn-save" style="margin-top:10px;" onclick="addConta()">ADICIONAR</button>
        </div>
        <div id="listaContas"></div>
        <button class="btn-main" style="background: #444; margin-top:20px; font-size:12px;" onclick="reset()">ZERAR TUDO</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('driver_elite_v5')) || { contas: [], hist: [] };
    let temp = null;

    function format(id) {
        let v = document.getElementById(id).value.replace(',', '.').trim();
        return v === "" ? 0 : parseFloat(v);
    }

    function inicializar() {
        if(localStorage.getItem('pref_m')) document.getElementById('media').value = localStorage.getItem('pref_m');
        if(localStorage.getItem('pref_g')) document.getElementById('gasolina').value = localStorage.getItem('pref_g');
        atualizarUI();
    }

    function mudarAba(n) {
        document.getElementById('aba1').classList.toggle('hidden', n !== 1);
        document.getElementById('aba2').classList.toggle('hidden', n !== 2);
        document.getElementById('aba3').classList.toggle('hidden', n !== 3);
        document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i+1 === n));
        if(n === 2) atualizarUI();
    }

    function calcular() {
        const b = format('bruto'), k = format('km'), h = format('horas'), c = format('comida'), m = format('media'), g = format('gasolina');
        if(b <= 0 || k <= 0 || m <= 0) return alert("Preencha os campos!");
        
        const gastoG = (k/m)*g;
        const liq = b - gastoG - c;
        
        document.getElementById('resLiq').innerText = "R$ " + liq.toFixed(2);
        document.getElementById('resLiqHr').innerText = "R$ " + (h > 0 ? (liq/h).toFixed(2) : "0.00");
        document.getElementById('resBrutoKm').innerText = "R$ " + (b/k).toFixed(2);
        document.getElementById('painelResultados').style.display = 'block';
        
        localStorage.setItem('pref_m', m); localStorage.setItem('pref_g', g);
        temp = { bruto: b, liq: liq, km: k, hr: h, data: new Date().toISOString() };
    }

    function salvar() {
        if(!temp) return alert("Calcule primeiro!");
        db.hist.push(temp);
        localStorage.setItem('driver_elite_v5', JSON.stringify(db));
        temp = null; alert("Salvo com sucesso!");
        document.getElementById('bruto').value = ""; document.getElementById('km').value = ""; document.getElementById('horas').value = "";
        document.getElementById('painelResultados').style.display = 'none';
        atualizarUI();
    }

    function addConta() {
        const n = document.getElementById('nomeConta').value, v = format('valorConta');
        if(!n || v <= 0) return;
        db.contas.push({id: Date.now(), nome: n, valor: v});
        localStorage.setItem('driver_elite_v5', JSON.stringify(db));
        document.getElementById('nomeConta').value = ""; document.getElementById('valorConta').value = "";
        atualizarUI();
    }

    function atualizarUI() {
        const agora = new Date();
        const totalContas = db.contas.reduce((a, b) => a + b.valor, 0);
        const liqMes = db.hist.filter(i => {
            let d = new Date(i.data);
            return d.getMonth() === agora.getMonth() && d.getFullYear() === agora.getFullYear();
        }).reduce((a, b) => a + b.liq, 0);

        const faltante = totalContas - liqMes;
        document.getElementById('dividaRestante').innerText = "R$ " + (faltante > 0 ? faltante.toFixed(2) : "0,00 (PAGA!)");
        document.getElementById('dividaRestante').style.color = faltante > 0 ? "var(--danger)" : "var(--primary)";
        document.getElementById('metaDiaria').innerText = Meta: R$ ${(faltante > 0 ? faltante/22 : 0).toFixed(2)} / dia (22d);

        renderizarResumos();
        
        document.getElementById('listaContas').innerHTML = db.contas.map(c => `
            <div class="bill-item"><span>${c.nome}</span> <b>R$ ${c.valor.toFixed(2)}</b></div>
        `).join('');
    }

    function renderizarResumos() {
        const agora = new Date();
        const periodos = [
            { label: 'Hoje', dias: 0 },
            { label: 'Últimos 7 Dias', dias: 7 },
            { label: 'Mês Atual', dias: 'mes' },
            { label: 'Ano Atual', dias: 'ano' }
        ];

        let html = "";
        periodos.forEach(p => {
            let filtrados = db.hist.filter(i => {
                let d = new Date(i.data);
                if(p.dias === 0) return d.toDateString() === agora.toDateString();
                if(p.dias === 'mes') return d.getMonth() === agora.getMonth() && d.getFullYear() === agora.getFullYear();
                if(p.dias === 'ano') return d.getFullYear() === agora.getFullYear();
                return (agora - d) / (1000*60*60*24) <= p.dias;
            });

            let b = filtrados.reduce((acc, v) => acc + v.bruto, 0);
            let l = filtrados.reduce((acc, v) => acc + v.liq, 0);
            let k = filtrados.reduce((acc, v) => acc + v.km, 0);
            let h = filtrados.reduce((acc, v) => acc + v.hr, 0);

            html += `
                <div class="stat-card">
                    <h4>${p.label}</h4>
                    <div class="grid-stats">
                        <div class="mini-stat">LUCRO LÍQUIDO<b style="color:var(--primary)">R$ ${l.toFixed(2)}</b></div>
                        <div class="mini-stat">BRUTO TOTAL<b>R$ ${b.toFixed(2)}</b></div>
                        <div class="mini-stat">LÍQUIDO P/ KM<b>R$ ${k > 0 ? (l/k).toFixed(2) : '0.00'}</b></div>
                        <div class="mini-stat">BRUTO P/ KM<b>R$ ${k > 0 ? (b/k).toFixed(2) : '0.00'}</b></div>
                        <div class="mini-stat">LÍQUIDO P/ HORA<b>R$ ${h > 0 ? (l/h).toFixed(2) : '0.00'}</b></div>
                        <div class="mini-stat">BRUTO P/ HORA<b>R$ ${h > 0 ? (b/h).toFixed(2) : '0.00'}</b></div>
                    </div>
                </div>
            `;
        });
        document.getElementById('renderStats').innerHTML = html;
    }

    function reset() { if(confirm("Zerar tudo?")) { localStorage.removeItem('driver_elite_v5'); location.reload(); } }
</script>
</body>
</html>
