<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Driver Elite</title>

<style>

body{
font-family:Arial;
background:#121212;
color:white;
margin:0;
padding:15px;
max-width:450px;
margin:auto;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:none;
background:#2a2a2a;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-bottom:10px;
font-weight:bold;
}

.calc{
background:#00ff88;
color:black;
}

#resultado{
background:#1e1e1e;
padding:15px;
border-radius:8px;
}

</style>

</head>

<body>

<h2>Driver Elite</h2>

<label>Ganho bruto</label>
<input id="bruto" type="number">

<label>KM rodados</label>
<input id="km" type="number">

<label>Alimentação</label>
<input id="comida" type="number">

<label>Média KM/L</label>
<input id="media" type="number">

<label>Preço gasolina</label>
<input id="gas" type="number">

<button id="calcular" class="calc">CALCULAR</button>

<div id="resultado"></div>

<script>

document.addEventListener("DOMContentLoaded", function(){

const calcularBtn = document.getElementById("calcular")

calcularBtn.addEventListener("click", function(){

const bruto = parseFloat(document.getElementById("bruto").value) || 0
const km = parseFloat(document.getElementById("km").value) || 0
const comida = parseFloat(document.getElementById("comida").value) || 0
const media = parseFloat(document.getElementById("media").value) || 0
const gas = parseFloat(document.getElementById("gas").value) || 0

if(bruto <= 0 || km <= 0 || media <= 0){

alert("Preencha bruto, km e média")
return

}

const custoGas = (km/media) * gas

const liquido = bruto - custoGas - comida

const brutoKm = bruto / km
const liquidoKm = liquido / km

document.getElementById("resultado").innerHTML =

"Lucro líquido: R$ " + liquido.toFixed(2) + "<br>" +
"Bruto por KM: R$ " + brutoKm.toFixed(2) + "<br>" +
"Líquido por KM: R$ " + liquidoKm.toFixed(2)

})

})

</script>

</body>
</html>
